# ── Console ──────────────────────────────────────────────────────────────────
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# ── GPIO (display backlight) ─────────────────────────────────────────────────
CONFIG_GPIO=y

# ── SPI + Display ─────────────────────────────────────────────────────────────
CONFIG_SPI=y
CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y

# ── System heap — nofrendo engine allocates ~130KB for NES state ─────────────
# Large pixel buffers (120KB framebuf + 60KB indexed) live in PSRAM
# (.ext_ram.bss static arrays in osd.c) so they do not count against DRAM.
# 192KB of DRAM heap is sufficient for nofrendo's dynamic allocations.
CONFIG_HEAP_MEM_POOL_SIZE=196608

# ── POSIX API: provides strdup() / snprintf() used by nofrendo ───────────────
CONFIG_POSIX_API=y

# ── Stack — nofrendo has deep call chains ─────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=32768

# ── Logging — DISABLED: nofrendo/log.c defines log_init() which conflicts
# with Zephyr's subsys/logging/log_core.c. printk() still works independently.
# CONFIG_LOG=y
