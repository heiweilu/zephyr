# ── Console ──────────────────────────────────────────────────────────────────
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# ── GPIO (display backlight) ─────────────────────────────────────────────────
CONFIG_GPIO=y

# ── SPI + Display ─────────────────────────────────────────────────────────────
CONFIG_SPI=y
CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y

# ── System heap ──────────────────────────────────────────────────────────────
# nofrendo calls malloc() (via _my_malloc / memguard.h) which uses picolibc's
# heap, NOT Zephyr's k_malloc heap. The libc heap = total DRAM minus everything
# else (including HEAP_MEM_POOL_SIZE). Keep k_malloc heap small so the remaining
# DRAM goes to the libc heap where nofrendo needs it (~130KB).
CONFIG_HEAP_MEM_POOL_SIZE=16384

# ── POSIX API: provides strdup() / snprintf() used by nofrendo ───────────────
CONFIG_POSIX_API=y

# ── Stack — nofrendo has deep call chains ─────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=32768

# ── Logging — DISABLED: nofrendo/log.c defines log_init() which conflicts
# with Zephyr's subsys/logging/log_core.c. printk() still works independently.
# CONFIG_LOG=y

# ── Bluetooth HID Host ───────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SMP=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=2
CONFIG_BT_ATT_TX_COUNT=6
CONFIG_BT_L2CAP_TX_BUF_COUNT=6
CONFIG_BT_BUF_ACL_RX_SIZE=200
CONFIG_BT_BUF_ACL_TX_SIZE=200
CONFIG_BT_SMP_SC_ONLY=n
CONFIG_BT_SMP_SC_PAIR_ONLY=n
CONFIG_BT_SMP_ENFORCE_MITM=n
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_BONDABLE=y

# ── BT persistent settings (bond storage) ─────────────────────────────────────
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# ── Audio: ES8311 DAC via I2C + I2S ──────────────────────────────────────────
CONFIG_I2C=y
CONFIG_I2S=y
CONFIG_DMA=y
CONFIG_I2S_ESP32_TX_BLOCK_COUNT=10
