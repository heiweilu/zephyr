# Console
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# I2C (ES8311 register config)
CONFIG_I2C=y

# I2S (audio data path)
CONFIG_I2S=y

# DMA (required for ESP32-S3 I2S)
CONFIG_DMA=y

# GPIO (PA control on IO46)
CONFIG_GPIO=y

# Stack
CONFIG_MAIN_STACK_SIZE=4096

# Logging
CONFIG_LOG=y
