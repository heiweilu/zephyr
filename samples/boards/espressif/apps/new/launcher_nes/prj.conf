# launcher_nes — slim launcher (no WiFi/AI/Camera) tailored for NES emulator
# Keep: Display, LVGL, BT HID Host, I2C/I2S, GPIO, Logging
# Drop: WiFi, Network, TLS, HTTP, Camera/Video, AI, Source Han font

# ── Console ──
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=4096

# ── GPIO (backlight + PA + BOOT button) ──
CONFIG_GPIO=y

# ── I2C (codec config / IMU) ──
CONFIG_I2C=y

# ── I2S (audio TX/RX, retained for future NES sound) ──
CONFIG_I2S=y
CONFIG_DMA=y

# ── SPI + Display ──
CONFIG_SPI=y
CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y

# ── LVGL (HOME screen only — no Source Han font, no Camera/Photos heavy use) ──
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=20480
CONFIG_LV_USE_LOG=n
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_Z_VDB_SIZE=4
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_USE_THEME_DEFAULT=n
CONFIG_LV_USE_THEME_SIMPLE=y

# ── Bluetooth HID Host ──
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SMP=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=4
CONFIG_BT_ATT_TX_COUNT=4
CONFIG_BT_L2CAP_TX_BUF_COUNT=4
CONFIG_BT_BUF_ACL_RX_SIZE=128
CONFIG_BT_BUF_ACL_TX_SIZE=128
CONFIG_BT_SMP_SC_ONLY=n
CONFIG_BT_SMP_SC_PAIR_ONLY=n
CONFIG_BT_SMP_ENFORCE_MITM=n
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_LOG_LEVEL_WRN=y

# ── BT persistent settings: disabled to mirror original launcher behaviour
# (BT_SETTINGS forced unauth-overwrite + bond store path that triggered
#  Scan start failed -EAGAIN on this sample)
# CONFIG_BT_SETTINGS=y
# CONFIG_SETTINGS=y
# CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# ── POSIX (snprintf/strdup used by future nofrendo bridge) ──
CONFIG_POSIX_API=y

# ── Stack (bumped to 32K for nofrendo NES emulator) ──
CONFIG_MAIN_STACK_SIZE=32768
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ── Heap ──
CONFIG_HEAP_MEM_POOL_SIZE=16384
# ── Console ──
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=4096

# ── GPIO (backlight + PA + BOOT button) ──
CONFIG_GPIO=y

# ── I2C (ES8311 + ES7210 codec config) ──
CONFIG_I2C=y

# ── I2S (audio TX/RX) + DMA ──
CONFIG_I2S=y
CONFIG_DMA=y

# ── SPI + Display ──
CONFIG_SPI=y
CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y

# ── Camera (OV3660 via LCD-CAM parallel DVP) ──
CONFIG_VIDEO=y
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=2
CONFIG_VIDEO_BUFFER_POOL_ALIGN=32
CONFIG_VIDEO_BUFFER_USE_SHARED_MULTI_HEAP=y
CONFIG_VIDEO_BUFFER_SMH_ATTRIBUTE=2
CONFIG_DMA_ESP32_MAX_DESCRIPTOR_NUM=64
CONFIG_VIDEO_ESP32_DMA_BUFFER_MAX_SIZE=4092
CONFIG_VIDEO_OV3660_COLOR_BAR_TEST=n

# ── LVGL (pool must be >=24K for launcher UI objects) ──
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=20480
CONFIG_LV_USE_LOG=n
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_FONT_SOURCE_HAN_SANS_SC_16_CJK=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_Z_VDB_SIZE=4
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_USE_IMAGE=y
# Disable default theme (adds shadows that crash on ESP32-S3 BLE+WiFi coex)
# Use simple theme instead — lightweight, no shadow rendering
CONFIG_LV_USE_THEME_DEFAULT=n
CONFIG_LV_USE_THEME_SIMPLE=y

# ── Bluetooth HID Host ──
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SMP=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=4
CONFIG_BT_ATT_TX_COUNT=4
CONFIG_BT_L2CAP_TX_BUF_COUNT=4
CONFIG_BT_BUF_ACL_RX_SIZE=128
CONFIG_BT_BUF_ACL_TX_SIZE=128
CONFIG_BT_SMP_SC_ONLY=n
CONFIG_BT_SMP_SC_PAIR_ONLY=n
CONFIG_BT_SMP_ENFORCE_MITM=n
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_LOG_LEVEL_WRN=y

# ── Networking ──
CONFIG_NETWORKING=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# ── WiFi (SPIRAM alloc saves DRAM for BLE+WiFi coexistence) ──
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=4
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=8
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=8
CONFIG_ESP32_WIFI_NET_ALLOC_SPIRAM=y
# Route wifi_malloc/wifi_calloc to PSRAM instead of system heap (k_malloc)
# Critical for BLE+WiFi coexistence: prevents 16KB DRAM heap exhaustion
CONFIG_ESP_WIFI_HEAP_SPIRAM=y

# ── DNS ──
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_AI_MAX_ENTRIES=2

# ── HTTP client ──
CONFIG_HTTP_CLIENT=y

# ── TLS / mbedTLS ──
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_CUSTOM_SECTION=y
CONFIG_MBEDTLS_HEAP_SIZE=65536
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384
CONFIG_MBEDTLS_SSL_EXTENDED_MASTER_SECRET=n
CONFIG_MBEDTLS_SSL_CLIENT_COMPRESSED_POINT_FORMATS=y
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_ALG_RSA_PSS=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_TLS12_PRF=y
CONFIG_PSA_WANT_ALG_HMAC=y
CONFIG_PSA_WANT_KEY_TYPE_DERIVE=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_RSA_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_CERT_VERIFY_CALLBACK=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=2
CONFIG_MBEDTLS_SERVER_NAME_INDICATION=y
# mbedTLS debug: enable only when debugging TLS handshake
# CONFIG_MBEDTLS_DEBUG=y
# CONFIG_MBEDTLS_LOG_LEVEL_DBG=y
# Disable P256M hardware driver to avoid partial ECC acceleration
# conflict when BLE SMP + TLS coexist (P-256 accelerated, P-384 not)
CONFIG_MBEDTLS_PSA_P256M_DRIVER_ENABLED=n
# CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=y

# ── (Legacy AI section MAIN_STACK_SIZE kept commented; effective value above) ──
# CONFIG_MAIN_STACK_SIZE=5120
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_NET_TX_STACK_SIZE=1024
CONFIG_NET_RX_STACK_SIZE=1024
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_PKT_RX_COUNT=24
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=24
CONFIG_NET_MAX_CONTEXTS=6

# ── Boost TCP/TLS receive throughput for qwen-tts-realtime audio deltas ──
# Server sends ~20KB chunks back-to-back; default 4KB TLS record + small TCP
# window starves the pipe. Observed: PC finishes in 620ms, ESP32 in 58s.
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=32768
# Larger net_buf fragment so the *effective* TCP RX window approaches what we
# advertise. Default 128 caps real window to ~RX_COUNT*128/3 bytes. Set to
# 256 (not 512) to keep DRAM headroom on this board (84% DRAM baseline).
CONFIG_NET_BUF_DATA_SIZE=256

# ── WiFi RX path: more HW DMA buffers + larger BA window (PSRAM build) ──
# Default static=4 / dynamic=8 drops frames at the WiFi MAC layer under any
# real load. Constraint: RX_BA_WIN <= 2 * STATIC_RX_BUFFER_NUM (HAL check).
# Espressif-defaults static=10/dynamic=32 caused boot hang here — use the
# smallest values that satisfy BA_WIN=16 and still double the buffers.
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=8
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=16
CONFIG_ESP32_WIFI_RX_BA_WIN=16
CONFIG_ESP32_WIFI_TX_BA_WIN=16
# Place WiFi TX/RX hot path in IRAM to avoid Flash cache misses on every pkt.
# (Disabled: caused boot hang on this board, likely IRAM/BLE conflict.)
# CONFIG_ESP32_WIFI_IRAM_OPT=y
# CONFIG_ESP32_WIFI_RX_IRAM_OPT=y

CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16

# ── Heap ──
CONFIG_HEAP_MEM_POOL_SIZE=16384

