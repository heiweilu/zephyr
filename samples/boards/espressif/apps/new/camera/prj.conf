# Camera firmware: minimal Video + LVGL + display, NO BT, NO WiFi, NO audio.

# ── Display + LVGL ──
CONFIG_DISPLAY=y
CONFIG_LVGL=y
CONFIG_LV_USE_LOG=n
CONFIG_LV_Z_MEM_POOL_SIZE=65536
CONFIG_LV_Z_VDB_SIZE=50
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_FONT_MONTSERRAT_14=y

# ── SPI for LCD ──
CONFIG_SPI=y
CONFIG_MIPI_DBI=y

# ── I2C for OV3660 sensor config ──
CONFIG_I2C=y

# ── GPIO for BOOT button ──
CONFIG_GPIO=y
CONFIG_GPIO_INIT_PRIORITY=40

# ── Video subsystem ──
CONFIG_VIDEO=y
CONFIG_VIDEO_LOG_LEVEL_INF=y
CONFIG_VIDEO_BUFFER_USE_SHARED_MULTI_HEAP=y
CONFIG_VIDEO_BUFFER_SMH_ATTRIBUTE=2
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=4
CONFIG_VIDEO_BUFFER_POOL_SZ_MAX=153600
CONFIG_VIDEO_ESP32_DMA_BUFFER_MAX_SIZE=4092
CONFIG_VIDEO_OV3660=y
CONFIG_VIDEO_OV3660_COLOR_BAR_TEST=n

# ── DMA for LCD-CAM ──
CONFIG_DMA=y
CONFIG_DMA_ESP32_MAX_DESCRIPTOR_NUM=64

# ── PSRAM (for photo storage + framebuffer) ──
CONFIG_ESP_SPIRAM=y
CONFIG_SHARED_MULTI_HEAP=y
CONFIG_ESP_SPIRAM_HEAP_SIZE=4194304

# ── Logging ──
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_SERIAL=y

# ── System ──
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
