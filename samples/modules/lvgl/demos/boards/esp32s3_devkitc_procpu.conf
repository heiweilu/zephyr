# CHD-ESP32-S3-BOX board config for LVGL demos

# GPIO for backlight
CONFIG_GPIO=y

# SPI + Display
CONFIG_SPI=y
CONFIG_MIPI_DBI=y

# Serial (USB console)
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Widgets demo
CONFIG_LV_Z_DEMO_WIDGETS=y

# 16-bit color, byte-swap for SPI
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_COLOR_16_SWAP=y
